apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-service
  namespace: interview-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: interview-service
  template:
    metadata:
      labels:
        app: interview-service
    spec:
      containers:
        - name: interview-service
          image: AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/interview-service:IMAGE_TAG
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama-service:11434"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
