apiVersion: v1
kind: Service
metadata:
  name: interview-service
  namespace: interview-system
spec:
  selector:
    app: interview-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: interview-system
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: interview-system
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
